stages:
  - test
  - build
  - package
  - deploy

default:
  interruptible: true

variables:
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend
  DOCKER_TLS_CERTDIR: "/certs"

frontend_test:
  stage: test
  image: node:20-alpine
  rules:
    - if: $CI_COMMIT_BRANCH
  script:
    - npm ci
    - npm test

frontend_build:
  stage: build
  image: node:20-alpine
  rules:
    - if: $CI_COMMIT_BRANCH
  script:
    - npm ci
    - npm run lint
    - npm run build

frontend_docker_build_push:
  stage: package
  image: docker:27.1.1
  services:
    - docker:27.1.1-dind
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -t "$FRONTEND_IMAGE:$CI_COMMIT_SHA" -f Dockerfile .
    - docker tag "$FRONTEND_IMAGE:$CI_COMMIT_SHA" "$FRONTEND_IMAGE:latest"
    - docker push "$FRONTEND_IMAGE:$CI_COMMIT_SHA"
    - docker push "$FRONTEND_IMAGE:latest"

frontend_deploy_production:
  stage: deploy
  image: alpine:3.20
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh "$SSH_USER@$SSH_HOST" "
        docker login -u '$CI_REGISTRY_USER' -p '$CI_REGISTRY_PASSWORD' '$CI_REGISTRY' &&
        docker pull '$FRONTEND_IMAGE:latest' &&
        docker rm -f library-frontend || true &&
        docker run -d --name library-frontend \
          --restart unless-stopped \
          -p 80:80 \
          '$FRONTEND_IMAGE:latest'
      "
run_tests:
  image: node:25-alpine3.22
  before_script:
    - apt-get update && apt-get install make
  script:
    - make test