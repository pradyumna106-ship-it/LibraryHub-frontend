stages:
  - test
  - build
  - package
  - deploy

default:
  interruptible: true

variables:
  IMAGE_NAME: pradyumnajkumar/library_hub
  IMAGE_TAG: libraryhub-frontend
  

frontend_test:
  stage: test
  image: node:20-alpine
  script:
    - npm ci
    - npm test

frontend_build:
  stage: build
  image: node:20-alpine
  needs: ["frontend_test"]
  script:
    - npm ci
    - npm run lint
    - npm run build

build_image:
  stage: package
  image: docker:29.4.0
  services:
    - docker:29.4.0-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$PASSWORD" | docker login -u "$USER_NAME" --password-stdin
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG .
    - docker push $IMAGE_NAME:$IMAGE_TAG

deploy:
  stage: deploy
  script:
    - echo "Deploy step here (e.g. SSH to server and pull Docker image)"